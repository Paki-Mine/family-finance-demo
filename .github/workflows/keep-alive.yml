name: Keep Supabase Demo Alive

# Il free tier Supabase mette in pausa progetti dopo ~7 giorni di inattività DB.
# Questo workflow fa una request settimanale per "svegliare" il database
# così che la demo pubblica resti sempre raggiungibile.

on:
  schedule:
    # Ogni lunedì alle 09:00 UTC (10:00 italiana invernale / 11:00 estiva)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # permette di lanciarlo manualmente da Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Supabase demo DB
        run: |
          URL="https://obiqfotyhzafcmhkvuum.supabase.co"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iaXFmb3R5aHphZmNtaGt2dXVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzczMTIsImV4cCI6MjA5MzA1MzMxMn0.3GNyO0hcAER8FcfaLZlnGu3W-EGdBoje8Gc6ONlG7u8"
          code=$(curl -s -o response.json -w "%{http_code}" \
            -H "apikey: $KEY" \
            "$URL/rest/v1/appdata?select=family_id&limit=1")
          if [ "$code" = "200" ]; then
            echo "✓ Demo DB is alive (HTTP $code)"
            cat response.json
          else
            echo "✗ Demo DB ping failed (HTTP $code)"
            cat response.json
            exit 1
          fi
